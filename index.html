<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D Test Page</title>
    <script src="https://cubism.live2d.com/sdk-web/bin/live2dcubismcore.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.12/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>
</head>
<body style="margin:0; background-color: #f0f0f0;">
    <canvas id="canvas"></canvas>

    <script>
        const app = new PIXI.Application({
            view: document.getElementById('canvas'),
            autoStart: true,
            resizeTo: window,
            transparent: true
        });

        
        const modelUrl = '아트머그샘플/라비아탄아트머그샘플';

        PIXI.live2d.Live2DModel.from(modelUrl).then(model => {
            app.stage.addChild(model);

            
            model.scale.set(0.3); 
            
            
            model.x = window.innerWidth / 2;
            model.y = window.innerHeight / 2;
            model.anchor.set(0.5, 0.5);

            
            model.interactive = true;
            window.addEventListener('mousemove', (e) => {
                model.focus(e.clientX, e.clientY);
            });
        });
    </script>
</body>
</html>
